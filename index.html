<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h3>Modern Image Gallery</h3>
    <button class="slidebtn" onclick="slideshow()">Slideshow</button>
    <div class="filters">

    <button onclick="filterimg('All')">
        All
    </button>

    <button onclick="filterimg('God')">
        God
    </button>

    <button onclick="filterimg('cartoon')">
        Cartoon
    </button>

    <button onclick="filterimg('friends')">
        Friends
    </button>

</div>
    <div class="gallery">
        <div class="card God">
        <img src="images/1.jpg" onclick="show(0)"></div>
        <div class="card friends">
        <img src="images/2.png" onclick="show(1)"></div>
        <div class="card God">
        <img src="images/3.jpg" onclick="show(2)"></div>
        <div class="card friends">
        <img src="images/4.png" onclick="show(3)"></div>
        <div class="card God">
        <img src="images/5.jpg" onclick="show(4)"></div>
        <div class="card cartoon">
        <img src="images/6.jpg" onclick="show(5)">
        </div>
        <div class="card cartoon">
        <img src="images/7.jpg"  onclick="show(6)"></div>
    </div>
    <div class="pop" id="pop">
        <span class="close" onclick="Close()">X</span>
        <button class="prev" onclick="previous()">❮</button>
        <img id="popimg">
        <button class="next" onclick="Next()">❯</button>
        

 </div>
 <script src="script.js"></script>
</body>
</html>
